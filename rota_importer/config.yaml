name: "Rota PDF Importer"
version: "2.5.46"
slug: "rota_importer"
description: "Upload rota PDFs, extract rows, store them, and export CSV"
url: "https://example.invalid/rota-pdf-importer"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false

ingress: true
ingress_port: 8099
panel_icon: mdi:file-table
panel_title: Logile Viewer
panel_admin: false

homeassistant_api: true
hassio_api: true
hassio_role: default

map:
  - type: addon_config
    read_only: false
  - type: homeassistant_config
    read_only: false
    path: /homeassistant

options:
  database_filename: "rota.db"

schema:
  database_filename: str
