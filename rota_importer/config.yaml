name: "Rota PDF Importer"
version: "2.0.8"
slug: "rota_importer"
description: "Upload rota PDFs, extract rows, store them, and export CSV"
url: "https://example.invalid/rota-pdf-importer"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false

ingress: true
ingress_port: 8099
panel_icon: mdi:file-table

map:
  - addon_config:rw

options:
  database_filename: "rota.db"

schema:
  database_filename: str
